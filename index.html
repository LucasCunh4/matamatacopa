<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#090b1b" />
  <title>Copa 26 Tracker</title>
  <style>
:root {
  color-scheme: dark;
  --bg: #090b1b;
  --bg-2: #121634;
  --panel: rgba(255,255,255,.075);
  --panel-2: rgba(255,255,255,.115);
  --line: rgba(255,255,255,.15);
  --text: #f7f7fb;
  --muted: #aeb6d6;
  --green: #00a887;
  --gold: #f4c66a;
  --red: #ff6b75;
  --purple: #6a3ff5;
  --blue: #3bb2ff;
  --shadow: 0 24px 70px rgba(0,0,0,.35);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(0,168,135,.42), transparent 28rem),
    radial-gradient(circle at 80% 10%, rgba(106,63,245,.48), transparent 30rem),
    linear-gradient(145deg, var(--bg), #060712 48%, #001d2a 120%);
  color: var(--text);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(circle at 50% 20%, #000 0, transparent 75%);
}

button, input, textarea, select { font: inherit; }
button { cursor: pointer; }
button:disabled, input:disabled { opacity: .45; cursor: not-allowed; }

.app-shell { width: min(1500px, calc(100% - 32px)); margin: 0 auto 48px; position: relative; z-index: 1; }
.hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 24px;
  padding: 32px 0 18px;
}
.logo-lockup { display: flex; gap: 18px; align-items: center; }
.logo {
  width: 70px;
  height: 70px;
  display: grid;
  place-items: center;
  border-radius: 23px;
  background: linear-gradient(145deg, var(--gold), #ffe7a1 42%, #b97a2e);
  box-shadow: 0 20px 48px rgba(244,198,106,.24);
  color: #171000;
  font-size: 38px;
}
.hero h1 { margin: 0; font-size: clamp(2rem, 4vw, 4.2rem); letter-spacing: -.06em; line-height: .95; }
.subtitle { color: var(--muted); margin: 8px 0 0; max-width: 760px; }
.hero-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
.saved-badge { color: var(--muted); border: 1px solid var(--line); padding: 9px 12px; border-radius: 999px; background: rgba(255,255,255,.05); }

.top-nav {
  display: flex;
  gap: 10px;
  padding: 10px;
  border: 1px solid var(--line);
  background: rgba(9,11,27,.72);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  position: sticky;
  top: 12px;
  z-index: 5;
  box-shadow: var(--shadow);
  margin-bottom: 24px;
}
.nav-btn, .primary-btn, .ghost-btn, .danger-btn, .icon-btn {
  border: 1px solid var(--line);
  color: var(--text);
  border-radius: 16px;
  background: rgba(255,255,255,.075);
  padding: 12px 16px;
  transition: .18s ease;
}
.nav-btn { flex: 1; display: flex; justify-content: center; gap: 10px; align-items: center; }
.nav-btn:hover, .ghost-btn:hover { background: rgba(255,255,255,.14); transform: translateY(-1px); }
.nav-btn.active { background: linear-gradient(135deg, rgba(0,168,135,.9), rgba(59,178,255,.72)); border-color: rgba(255,255,255,.24); }
.primary-btn { background: linear-gradient(135deg, var(--green), var(--blue)); border-color: transparent; font-weight: 800; }
.danger-btn { background: rgba(255,107,117,.13); border-color: rgba(255,107,117,.4); color: #ffd8dc; }
.icon-btn { width: 38px; height: 38px; padding: 0; border-radius: 12px; color: var(--muted); }

.screen-head, .section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 18px;
}
.screen-head h2, .section-title h2, .section-title h3 { margin: 0; letter-spacing: -.03em; }
.screen-head h2 { font-size: clamp(1.7rem, 3vw, 3rem); }
.eyebrow { margin: 0 0 6px; color: var(--gold); text-transform: uppercase; font-weight: 900; letter-spacing: .12em; font-size: .75rem; }
.legend { color: var(--muted); display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.dot { width: 10px; height: 10px; border-radius: 99px; display: inline-block; }
.dot.green { background: var(--green); }
.dot.gold { background: var(--gold); }

.groups-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
.group-card, .wide-card, .third-map-card, .champion-card, .match-card {
  border: 1px solid var(--line);
  background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.055));
  border-radius: 26px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.group-card header { padding: 18px; border-bottom: 1px solid var(--line); }
.group-card h3 { margin: 0 0 8px; font-size: 1.4rem; }
.group-card header span { color: var(--muted); font-size: .92rem; line-height: 1.5; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 650px; }
th, td { padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,.08); text-align: center; white-space: nowrap; }
th { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; }
td.team-cell, th:nth-child(2) { text-align: left; }
tr.qualified { background: rgba(0,168,135,.11); }
tr.third { background: rgba(244,198,106,.105); }
.pos { font-weight: 900; color: var(--gold); }
.flag { font-size: 1.25em; margin-right: 7px; vertical-align: -1px; }
.team-cell, .result-team, .bracket-team span { display: flex; align-items: center; gap: 2px; }
.group-card details { padding: 0 18px 18px; }
.group-card summary { padding-top: 16px; color: var(--gold); cursor: pointer; font-weight: 800; }
.mini-matches { list-style: none; padding: 0; margin: 12px 0 0; display: grid; gap: 9px; }
.mini-matches li { display: grid; grid-template-columns: 84px 1fr auto 1fr; gap: 10px; align-items: center; color: var(--muted); font-size: .9rem; }
.score-chip { color: var(--text); border: 1px solid var(--line); padding: 4px 8px; border-radius: 999px; background: rgba(0,0,0,.18); }

.wide-card, .third-map-card { margin-top: 18px; padding: 20px; }
.badge { display: inline-flex; align-items: center; justify-content: center; padding: 7px 10px; border-radius: 999px; border: 1px solid var(--line); background: rgba(255,255,255,.08); color: var(--muted); font-size: .83rem; font-weight: 800; }
.badge.ok { color: #c7fff4; border-color: rgba(0,168,135,.45); background: rgba(0,168,135,.16); }
.muted-badge { color: #d7d9e7; }
.muted { color: var(--muted); }
.warning { display: inline-block; color: #ffe0a0; margin-top: 8px; font-size: .8rem; }

.editor-grid { display: grid; gap: 18px; }
.json-card textarea {
  width: 100%;
  min-height: 210px;
  resize: vertical;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(0,0,0,.28);
  color: var(--text);
  padding: 16px;
  outline: none;
}
.json-card textarea:focus, .score-input:focus, .winner-select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,178,255,.15); }
.actions-row { display: flex; gap: 10px; align-items: center; }
.actions-row.wrap { flex-wrap: wrap; margin-top: 12px; }
.hint { color: var(--muted); margin: 12px 0 0; }
.result-list { display: grid; gap: 16px; }
.result-block { border: 1px solid rgba(255,255,255,.1); border-radius: 20px; overflow: hidden; }
.result-block h4 { margin: 0; padding: 14px 16px; background: rgba(255,255,255,.08); }
.result-row {
  display: grid;
  grid-template-columns: 120px minmax(150px, 1fr) 58px 22px 58px minmax(150px, 1fr) 38px;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  border-top: 1px solid rgba(255,255,255,.08);
}
.result-row.knockout-row { grid-template-columns: 150px minmax(150px, 1fr) 58px 22px 58px minmax(150px, 1fr) 38px minmax(170px, auto); }
.match-meta { display: grid; gap: 3px; color: var(--muted); font-size: .84rem; }
.match-meta strong { color: var(--text); }
.result-team.right { justify-content: flex-end; text-align: right; }
.score-input, .winner-select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: rgba(0,0,0,.28);
  color: var(--text);
  padding: 10px;
  outline: none;
  text-align: center;
}
.winner-select { text-align: left; min-width: 180px; }
.versus { color: var(--gold); font-weight: 900; text-align: center; }

.champion-card { padding: 14px 18px; min-width: 260px; background: linear-gradient(135deg, rgba(244,198,106,.22), rgba(0,168,135,.13)); }
.champion-card span { display: block; color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .1em; font-weight: 900; }
.champion-card strong { display: block; margin-top: 5px; font-size: 1.1rem; }
.third-map-card { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; color: var(--muted); }
.third-map-card strong { color: var(--gold); }
.map-line { width: 100%; color: #e9eefc; }
.bracket-board {
  display: grid;
  grid-template-columns: repeat(5, minmax(260px, 1fr));
  gap: 18px;
  align-items: start;
  overflow-x: auto;
  padding-bottom: 12px;
}
.round-column { display: grid; gap: 14px; min-width: 260px; }
.round-column h3 { margin: 0; color: var(--gold); text-align: center; }
.match-card { padding: 12px; position: relative; overflow: visible; }
.match-card header { display: flex; justify-content: space-between; color: var(--muted); font-size: .82rem; margin-bottom: 10px; }
.match-card header span { color: var(--gold); font-weight: 900; }
.bracket-team {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 34px;
  gap: 8px;
  align-items: center;
  padding: 10px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(0,0,0,.16);
  border-radius: 14px;
  margin-top: 7px;
}
.bracket-team.winner { border-color: rgba(0,168,135,.7); background: rgba(0,168,135,.18); }
.bracket-team b { color: var(--gold); font-size: 1.1rem; text-align: right; }

.toast {
  position: fixed;
  left: 50%; bottom: 22px;
  transform: translate(-50%, 20px);
  opacity: 0;
  pointer-events: none;
  transition: .22s ease;
  z-index: 50;
  padding: 12px 16px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(8,10,24,.92);
  box-shadow: var(--shadow);
}
.toast.show { opacity: 1; transform: translate(-50%, 0); }

@media (max-width: 1160px) {
  .groups-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .hero { grid-template-columns: 1fr; }
  .hero-actions { justify-content: flex-start; }
}
@media (max-width: 760px) {
  .app-shell { width: min(100% - 18px, 1500px); }
  .hero { padding-top: 20px; }
  .logo { width: 56px; height: 56px; font-size: 30px; border-radius: 18px; }
  .groups-grid { grid-template-columns: 1fr; }
  .top-nav { overflow-x: auto; }
  .nav-btn { min-width: 150px; }
  .screen-head, .section-title { align-items: flex-start; flex-direction: column; }
  .result-row, .result-row.knockout-row {
    grid-template-columns: 1fr 44px 20px 44px 1fr 34px;
  }
  .match-meta { grid-column: 1 / -1; }
  .winner-select { grid-column: 1 / -1; }
  .mini-matches li { grid-template-columns: 1fr; }
}
  

/* --- Bracket redesign: classic left/right layout + cleaner minimalist details --- */
:root {
  --panel-soft: rgba(255,255,255,.055);
  --panel-strong: rgba(255,255,255,.09);
  --line-soft: rgba(255,255,255,.10);
}
body::before {
  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
}
.group-card, .wide-card, .third-map-card, .champion-card, .match-card {
  background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.045));
  box-shadow: 0 18px 42px rgba(0,0,0,.22);
}
.top-nav, .group-card, .wide-card, .third-map-card, .champion-card, .match-card {
  backdrop-filter: blur(14px);
}
.match-card {
  padding: 12px 12px 10px;
  border-radius: 20px;
}
.match-card header {
  margin-bottom: 6px;
  font-size: .78rem;
}
.match-card header strong {
  color: var(--text);
  font-size: .8rem;
  font-weight: 700;
}
.match-source {
  color: var(--muted);
  font-size: .72rem;
  margin-bottom: 8px;
  letter-spacing: .02em;
}
.bracket-team {
  padding: 9px 10px;
  border-radius: 12px;
  margin-top: 6px;
  background: rgba(255,255,255,.03);
}
.bracket-team b {
  min-width: 24px;
}
.third-map-card {
  margin-bottom: 18px;
}
.bracket-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 270px minmax(0, 1fr);
  gap: 18px;
  align-items: stretch;
}
.bracket-side-panel,
.bracket-center-panel {
  border: 1px solid var(--line);
  border-radius: 28px;
  background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.035));
  box-shadow: 0 18px 42px rgba(0,0,0,.22);
  overflow: hidden;
}
.bracket-side-panel {
  padding: 18px;
}
.bracket-center-panel {
  padding: 18px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 14px;
}
.bracket-headings {
  display: grid;
  grid-template-columns: repeat(4, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 14px;
}
.bracket-headings span {
  text-align: center;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: .11em;
  font-size: .73rem;
  font-weight: 800;
}
.bracket-tree {
  display: grid;
  grid-template-columns: repeat(4, minmax(180px, 1fr));
  grid-template-rows: repeat(8, minmax(116px, auto));
  gap: 14px;
  position: relative;
}
.bracket-slot {
  display: flex;
  align-items: center;
  min-height: 0;
}
.bracket-slot .match-card {
  width: 100%;
}
.bracket-side-panel.mirrored .match-card {
  text-align: left;
}
.bracket-center-label {
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: .12em;
  font-size: .72rem;
  font-weight: 900;
}
.final-focus, .third-focus, .champion-focus {
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 14px;
  background: rgba(255,255,255,.045);
}
.final-focus .match-card,
.third-focus .match-card {
  margin-top: 10px;
}
.champion-focus {
  background: linear-gradient(145deg, rgba(244,198,106,.18), rgba(0,168,135,.10));
}
.champion-focus strong {
  display: block;
  margin-top: 6px;
  font-size: 1.1rem;
}
.champion-mini {
  color: var(--muted);
  font-size: .88rem;
  margin-top: 4px;
}
@media (max-width: 1400px) {
  .bracket-layout {
    grid-template-columns: 1fr;
  }
  .bracket-center-panel {
    order: -1;
  }
}
@media (max-width: 980px) {
  .bracket-side-panel {
    overflow-x: auto;
  }
  .bracket-headings,
  .bracket-tree {
    min-width: 810px;
  }
}
@media (max-width: 760px) {
  .bracket-layout {
    gap: 14px;
  }
  .bracket-side-panel,
  .bracket-center-panel {
    border-radius: 22px;
    padding: 14px;
  }
}

function freshState() {
  return { groupResults: {}, knockoutResults: {}, updatedAt: null };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return freshState();
    const parsed = JSON.parse(raw);
    return { ...freshState(), ...parsed, groupResults: parsed.groupResults || {}, knockoutResults: parsed.knockoutResults || {} };
  } catch (error) {
    console.warn('Falha ao carregar estado:', error);
    return freshState();
  }
}

function saveState() {
  state.updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateSavedBadge();
}

  if (!state.updatedAt) {
    badge.textContent = 'sem alterações salvas';
    return;
  }
  const date = new Date(state.updatedAt);
  badge.textContent = `salvo às ${date.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })}`;
}

function teamLabel(id) {
  if (!id || !TEAMS[id]) return '<span class="muted">A definir</span>';
  return `<span class="flag">${TEAMS[id].flag}</span><span>${TEAMS[id].name}</span>`;
}

function teamPlain(id) {
  return id && TEAMS[id] ? `<span class="flag">${TEAMS[id].flag}</span>${TEAMS[id].name}` : 'A definir';
}

function normalizeText(text) {
  return String(text || '')
    .normalize('NFD')
    .replace(/[̀-ͯ]/g, '')
    .toLowerCase()
    .trim();
}

function toNumberOrNull(value) {
  if (value === '' || value === null || value === undefined) return null;
  const n = Number(value);
  return Number.isInteger(n) && n >= 0 ? n : null;
}

function getGroupResult(matchId) {
  const r = state.groupResults[matchId];
  return r || { homeGoals: null, awayGoals: null };
}

function getKoResult(matchId) {
  const r = state.knockoutResults[matchId];
  return r || { homeGoals: null, awayGoals: null, winner: null };
}

function isCompleteResult(r) {
  return Number.isInteger(r?.homeGoals) && Number.isInteger(r?.awayGoals);
}

function statTemplate(teamId, group) {
  return { team: teamId, group, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 };
}

function computeStandings() {
  const standings = {};
  GROUP_LETTERS.forEach(group => {
    const table = Object.fromEntries(GROUPS[group].map(id => [id, statTemplate(id, group)]));
    GROUP_MATCHES.filter(m => m.group === group).forEach(match => {
      const r = getGroupResult(match.id);
      if (!isCompleteResult(r)) return;
      const h = table[match.home];
      const a = table[match.away];
      h.p++; a.p++;
      h.gf += r.homeGoals; h.ga += r.awayGoals;
      a.gf += r.awayGoals; a.ga += r.homeGoals;
      if (r.homeGoals > r.awayGoals) { h.w++; h.pts += 3; a.l++; }
      else if (r.homeGoals < r.awayGoals) { a.w++; a.pts += 3; h.l++; }
      else { h.d++; a.d++; h.pts++; a.pts++; }
    });
    Object.values(table).forEach(t => t.gd = t.gf - t.ga);
    standings[group] = Object.values(table).sort(groupComparator(group));
  });
  return standings;
}

function groupComparator(group) {
  return (a,b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const h2h = headToHead(group, a.team, b.team);
    if (h2h !== 0) return h2h;
    if (b.gd !== a.gd) return b.gd - a.gd;
    if (b.gf !== a.gf) return b.gf - a.gf;
    return TEAMS[a.team].name.localeCompare(TEAMS[b.team].name, 'pt-BR');
  };
}

function headToHead(group, teamA, teamB) {
  const match = GROUP_MATCHES.find(m => m.group === group && ((m.home === teamA && m.away === teamB) || (m.home === teamB && m.away === teamA)));
  if (!match) return 0;
  const r = getGroupResult(match.id);
  if (!isCompleteResult(r) || r.homeGoals === r.awayGoals) return 0;
  const homeWon = r.homeGoals > r.awayGoals;
  const winner = homeWon ? match.home : match.away;
  return winner === teamA ? -1 : 1;
}

function computeThirdRanking(standings) {
  return GROUP_LETTERS.map(group => standings[group][2]).sort((a,b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd !== a.gd) return b.gd - a.gd;
    if (b.gf !== a.gf) return b.gf - a.gf;
    return TEAMS[a.team].name.localeCompare(TEAMS[b.team].name, 'pt-BR');
  });
}

function qualificationContext() {
  const standings = computeStandings();
  const thirdRanking = computeThirdRanking(standings);
  const topThirds = thirdRanking.slice(0, 8);
  const thirdByGroup = Object.fromEntries(topThirds.map(t => [t.group, t.team]));
  const thirdKey = topThirds.map(t => t.group).sort().join('');
  const annex = ANNEX_C_MAP[thirdKey] || null;
  return { standings, thirdRanking, topThirds, thirdByGroup, thirdKey, annex };
}

function resolveSeed(seed, ctx = qualificationContext()) {
  if (!seed) return null;
  const pos = Number(seed[0]) - 1;
  const group = seed[1];
  return ctx.standings[group]?.[pos]?.team || null;
}

function resolveThird(column, ctx = qualificationContext()) {
  const group = ctx.annex?.[column];
  if (!group) return null;
  return ctx.thirdByGroup[group] || null;
}

function getMatchTeams(match, ctx = qualificationContext()) {
  if (match.homeSeed || match.awaySeed || match.awayThirdFor) {
    return {
      home: resolveSeed(match.homeSeed, ctx),
      away: match.awayThirdFor ? resolveThird(match.awayThirdFor, ctx) : resolveSeed(match.awaySeed, ctx),
      homeSource: match.homeSeed,
      awaySource: match.awayThirdFor ? match.awayLabel : match.awaySeed
    };
  }
  return {
    home: match.homeFrom ? getWinner(match.homeFrom, ctx) : getLoser(match.homeLoserFrom, ctx),
    away: match.awayFrom ? getWinner(match.awayFrom, ctx) : getLoser(match.awayLoserFrom, ctx),
    homeSource: match.homeFrom ? `Venc. ${shortGame(match.homeFrom)}` : `Perd. ${shortGame(match.homeLoserFrom)}`,
    awaySource: match.awayFrom ? `Venc. ${shortGame(match.awayFrom)}` : `Perd. ${shortGame(match.awayLoserFrom)}`
  };
}

function shortGame(id) {
  const m = KO_BY_ID[id];
  return m ? m.jogo : id;
}

function getWinner(matchId, ctx = qualificationContext()) {
  const match = KO_BY_ID[matchId];
  if (!match) return null;
  const teams = getMatchTeams(match, ctx);
  const r = getKoResult(matchId);
  if (!teams.home || !teams.away || !isCompleteResult(r)) return null;
  if (r.homeGoals > r.awayGoals) return teams.home;
  if (r.homeGoals < r.awayGoals) return teams.away;
  if (r.winner === teams.home || r.winner === teams.away) return r.winner;
  return null;
}

function getLoser(matchId, ctx = qualificationContext()) {
  const match = KO_BY_ID[matchId];
  if (!match) return null;
  const teams = getMatchTeams(match, ctx);
  const winner = getWinner(matchId, ctx);
  if (!winner || !teams.home || !teams.away) return null;
  return winner === teams.home ? teams.away : teams.home;
}

function champion(ctx = qualificationContext()) {
  return getWinner('FINAL', ctx);
}

function setGroupResult(matchId, key, value) {
  const r = getGroupResult(matchId);
  const next = { ...r, [key]: toNumberOrNull(value) };
  state.groupResults[matchId] = next;
  saveState();
  render();
}

function setKoResult(matchId, key, value) {
  const r = getKoResult(matchId);
  const next = { ...r };
  if (key === 'winner') next.winner = value || null;
  else next[key] = toNumberOrNull(value);
  state.knockoutResults[matchId] = next;
  saveState();
  render();
}

function clearGroupResult(matchId) {
  delete state.groupResults[matchId];
  saveState();
  render();
}

function clearKoResult(matchId) {
  delete state.knockoutResults[matchId];
  saveState();
  render();
}

function render() {
  $$('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.screen === currentScreen));
  const ctx = qualificationContext();
  if (currentScreen === 'groups') renderGroups(ctx);
  if (currentScreen === 'results') renderResults(ctx);
  if (currentScreen === 'bracket') renderBracket(ctx);
  updateSavedBadge();
}

function koResultRow(m, ctx) {
  const teams = getMatchTeams(m, ctx);
  const r = getKoResult(m.id);
  const needsTieWinner = isCompleteResult(r) && r.homeGoals === r.awayGoals && teams.home && teams.away;
  const winnerOptions = needsTieWinner ? `
    <select class="winner-select ko-winner" data-match="${m.id}">
      <option value="">vencedor nos pênaltis</option>
      <option value="${teams.home}" ${r.winner === teams.home ? 'selected' : ''}>${TEAMS[teams.home].name}</option>
      <option value="${teams.away}" ${r.winner === teams.away ? 'selected' : ''}>${TEAMS[teams.away].name}</option>
    </select>
  ` : '';
  const locked = !teams.home || !teams.away ? 'disabled' : '';
  return `
    <div class="result-row knockout-row">
      <div class="match-meta"><strong>${m.stage} · ${m.jogo}</strong><span>${m.date} ${m.time}</span></div>
      <div class="result-team right">${teams.home ? teamLabel(teams.home) : `<span class="muted">${m.homeSource || 'A definir'}</span>`}</div>
      <input class="score-input ko-score" type="number" min="0" inputmode="numeric" value="${r.homeGoals ?? ''}" data-match="${m.id}" data-key="homeGoals" ${locked}>
      <span class="versus">×</span>

      <div class="result-team">${teams.away ? teamLabel(teams.away) : `<span class="muted">${m.awaySource || 'A definir'}</span>`}</div>
      <button class="icon-btn clear-ko" data-match="${m.id}" title="Limpar jogo">×</button>

  `;
}

function bracketMatchCard(m, ctx, mirrored = false) {
  const teams = getMatchTeams(m, ctx);
  const r = getKoResult(m.id);
  const winner = getWinner(m.id, ctx);
  const homeWinner = winner && winner === teams.home;
  const awayWinner = winner && winner === teams.away;
  const homeScore = isCompleteResult(r) ? r.homeGoals : '–';
  const awayScore = isCompleteResult(r) ? r.awayGoals : '–';
  const tieNote = isCompleteResult(r) && r.homeGoals === r.awayGoals && !winner && teams.home && teams.away ? '<span class="warning">definir vencedor nos pênaltis</span>' : '';
  const source = [teams.homeSource, teams.awaySource].filter(Boolean).join(' · ');
  return `
    <article class="match-card ${mirrored ? 'mirrored' : ''}">
      <header><span>${m.jogo}</span><strong>${m.date} · ${m.time}</strong></header>
      ${source ? `<div class="match-source">${source}</div>` : ''}
      <div class="bracket-team ${homeWinner ? 'winner' : ''}"><span>${teams.home ? teamLabel(teams.home) : `<span class="muted">${m.homeSource || 'A definir'}</span>`}</span><b>${homeScore}</b></div>
      <div class="bracket-team ${awayWinner ? 'winner' : ''}"><span>${teams.away ? teamLabel(teams.away) : `<span class="muted">${m.awaySource || 'A definir'}</span>`}</span><b>${awayScore}</b></div>
      ${tieNote}
    </article>
  `;
}

  };

  const box = $('#jsonBox');
  box.value = JSON.stringify(exportObject(), null, 2);
  box.focus();
  box.select();
}

async function copyJson() {
  const json = JSON.stringify(exportObject(), null, 2);
  $('#jsonBox').value = json;
  try {
    await navigator.clipboard.writeText(json);
    toast('JSON copiado.');
  } catch {
    toast('JSON gerado na caixa de texto.');
  }
}

function importJson() {
  const raw = $('#jsonBox').value.trim();
  if (!raw) return toast('Cole um JSON primeiro.');
  try {
    const data = JSON.parse(raw);
    if (Array.isArray(data)) importSimpleArray(data);
    else importFullState(data);
    saveState();
    toast('JSON importado com sucesso.');
    render();
  } catch (error) {
    toast('Não consegui ler esse JSON.');
    console.error(error);
  }
}

function importFullState(data) {
  if (data.groupResults) state.groupResults = sanitizeGroupResults(data.groupResults);
  if (data.knockoutResults) state.knockoutResults = sanitizeKoResults(data.knockoutResults);
}

function importSimpleArray(list) {
  const byNames = new Map();
  GROUP_MATCHES.forEach(m => {
    const k1 = `${normalizeText(TEAMS[m.home].name)}|${normalizeText(TEAMS[m.away].name)}`;
    const k2 = `${normalizeText(TEAMS[m.away].name)}|${normalizeText(TEAMS[m.home].name)}`;
    byNames.set(k1, { match:m, reverse:false });
    byNames.set(k2, { match:m, reverse:true });
  });
  list.forEach(item => {
    const key = `${normalizeText(item.home || item.casa || item.mandante)}|${normalizeText(item.away || item.fora || item.visitante)}`;
    const found = byNames.get(key);
    if (!found) return;
    const hg = toNumberOrNull(item.homeGoals ?? item.golsCasa ?? item.placarCasa);
    const ag = toNumberOrNull(item.awayGoals ?? item.golsFora ?? item.placarFora);
    if (hg === null || ag === null) return;
    state.groupResults[found.match.id] = found.reverse ? { homeGoals: ag, awayGoals: hg } : { homeGoals: hg, awayGoals: ag };
  });
}

function sanitizeGroupResults(obj) {
  const clean = {};
  GROUP_MATCHES.forEach(m => {
    const r = obj[m.id];
    if (!r) return;
    clean[m.id] = { homeGoals: toNumberOrNull(r.homeGoals), awayGoals: toNumberOrNull(r.awayGoals) };
  });
  return clean;
}

function sanitizeKoResults(obj) {
  const clean = {};
  KNOCKOUT_MATCHES.forEach(m => {
    const r = obj[m.id];
    if (!r) return;
    clean[m.id] = { homeGoals: toNumberOrNull(r.homeGoals), awayGoals: toNumberOrNull(r.awayGoals), winner: r.winner || null };
  });
  return clean;
}

function clearAll() {
  if (!confirm('Limpar todos os resultados salvos?')) return;
  state = freshState();
  saveState();
  render();
  toast('Resultados apagados.');
}

function loadExample() {
  const sample = {
    'G-A-1': {homeGoals:2, awayGoals:0}, 'G-A-2': {homeGoals:2, awayGoals:1}, 'G-A-3': {homeGoals:1, awayGoals:1}, 'G-A-4': {homeGoals:1, awayGoals:0}, 'G-A-5': {homeGoals:0, awayGoals:2}, 'G-A-6': {homeGoals:1, awayGoals:1},
    'G-B-1': {homeGoals:1, awayGoals:1}, 'G-B-2': {homeGoals:1, awayGoals:1}, 'G-B-3': {homeGoals:4, awayGoals:1}, 'G-B-4': {homeGoals:6, awayGoals:0}, 'G-B-5': {homeGoals:2, awayGoals:2}, 'G-B-6': {homeGoals:1, awayGoals:2},
    'G-C-1': {homeGoals:1, awayGoals:1}, 'G-C-2': {homeGoals:0, awayGoals:1}, 'G-C-3': {homeGoals:0, awayGoals:1}, 'G-C-4': {homeGoals:3, awayGoals:0}, 'G-C-5': {homeGoals:0, awayGoals:2}, 'G-C-6': {homeGoals:2, awayGoals:0},
    'G-D-1': {homeGoals:4, awayGoals:1}, 'G-D-2': {homeGoals:2, awayGoals:0}, 'G-D-3': {homeGoals:2, awayGoals:0}, 'G-D-4': {homeGoals:0, awayGoals:1}, 'G-D-5': {homeGoals:1, awayGoals:3}, 'G-D-6': {homeGoals:1, awayGoals:1}
  };

function toast(message) {
  const el = $('#toast');
  el.textContent = message;
  el.classList.add('show');
  window.clearTimeout(toast.timer);
  toast.timer = window.setTimeout(() => el.classList.remove('show'), 2600);
}

function bindNavigation() {
  $$('.nav-btn').forEach(btn => btn.addEventListener('click', () => {
    currentScreen = btn.dataset.screen;
    render();
  }));
}

function setupInstallButton() {
  let deferredPrompt = null;
  const btn = $('#installBtn');
  window.addEventListener('beforeinstallprompt', event => {
    event.preventDefault();
    deferredPrompt = event;
    btn.hidden = false;
  });
  btn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    btn.hidden = true;
  });
}


bindNavigation();
setupInstallButton();
render();
  </script>
