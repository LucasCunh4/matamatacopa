function loser(id,c=ctx()){const tm=teams(koBy[id],c),w=winner(id,c);return w&&tm.home&&tm.away?(w===tm.home?tm.away:tm.home):null}
function champ(c=ctx()){return winner('FINAL',c)}
function render(){$$('.tab').forEach(b=>b.classList.toggle('on',b.dataset.s===screen));const c=ctx();if(screen==='groups')groups(c);if(screen==='results')results(c);if(screen==='bracket')bracket(c);badge()}
function groups(c){$('#app').innerHTML=`<section class="head"><div><p class="eyebrow">Fase de grupos</p><h2>Classificação ao vivo</h2></div><span class="muted">1º e 2º passam · 8 melhores terceiros passam</span></section><section class="grid">${letters.map(g=>groupCard(g,c)).join('')}</section>${thirdCard(c)}`}
function groupCard(g,c){return`<article class="card"><header><h3>Grupo ${g}</h3><span class="muted">${G[g].map(plain).join(' · ')}</span></header><div class="table"><table><thead><tr><th>#</th><th>Seleção</th><th>J</th><th>Pts</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead><tbody>${c.standings[g].map((s,i)=>`<tr class="${i<2?'q':i===2?'third':''}"><td class="pos">${i+1}</td><td class="team">${lab(s.team)}</td><td>${s.p}</td><td>${s.pts}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td><td>${s.gf}</td><td>${s.ga}</td><td>${s.gd}</td></tr>`).join('')}</tbody></table></div><ul class="matches">${M.filter(m=>m[1]===g).map(m=>{const r=gr(m[0]);return`<li><span>${m[2]} ${m[3]}</span><span>${plain(m[4])}</span><span class="score">${done(r)?r.homeGoals+' × '+r.awayGoals:'pendente'}</span><span>${plain(m[5])}</span></li>`}).join('')}</ul></article>`}
function thirdCard(c){return`<section class="wide"><div class="head"><div><p class="eyebrow">8 melhores terceiros</p><h2>Ranking dos terceiros</h2></div><span class="badge">${c.thirdKey||'—'}</span></div><div class="table"><table><thead><tr><th>#</th><th>Grupo</th><th>Seleção</th><th>J</th><th>Pts</th><th>SG</th><th>GP</th><th>Status</th></tr></thead><tbody>${c.rank.map((s,i)=>`<tr class="${i<8?'q':''}"><td class="pos">${i+1}</td><td>${s.group}</td><td class="team">${lab(s.team)}</td><td>${s.p}</td><td>${s.pts}</td><td>${s.gd}</td><td>${s.gf}</td><td><span class="badge ${i<8?'ok':'out'}">${i<8?'passando':'fora'}</span></td></tr>`).join('')}</tbody></table></div></section>`}
function results(c){$('#app').innerHTML=`<section class="head"><div><p class="eyebrow">Atualizar resultados</p><h2>Preencha jogo a jogo ou cole JSON</h2></div><div class="actions"><button id="ex">Carregar exemplo</button><button class="danger" id="clear">Limpar tudo</button></div></section><section class="wide"><p class="eyebrow">Importar / exportar</p><textarea id="json" placeholder="Cole aqui o JSON"></textarea><div class="actions"><button class="primary" id="imp">Importar</button><button id="exp">Exportar</button><button id="copy">Copiar</button></div></section><section class="wide"><p class="eyebrow">Fase de grupos</p>${letters.map(g=>`<div class="block"><h4>Grupo ${g}</h4>${M.filter(m=>m[1]===g).map(rowG).join('')}</div>`).join('')}</section><section class="wide"><p class="eyebrow">Mata-mata</p>${KO.map(m=>rowK(m,c)).join('')}</section>`;bindResults()}
function rowG(m){const r=gr(m[0]);return`<div class="row"><div class="meta"><b>${m[2]} ${m[3]}</b><br>${m[0]}</div><div class="rt r">${lab(m[4])}</div><input type="number" min="0" value="${r.homeGoals??''}" data-t="g" data-id="${m[0]}" data-k="homeGoals"><span class="x">×</span><input type="number" min="0" value="${r.awayGoals??''}" data-t="g" data-id="${m[0]}" data-k="awayGoals"><div class="rt">${lab(m[5])}</div><button data-clear-g="${m[0]}">×</button></div>`}
function rowK(m,c){const tm=teams(m,c),r=kr(m[0]),tie=done(r)&&r.homeGoals===r.awayGoals&&tm.home&&tm.away,dis=!tm.home||!tm.away?'disabled':'';return`<div class="row koRow"><div class="meta"><b>${m[1]} · ${m[2]}</b><br>${m[3]} ${m[4]}</div><div class="rt r">${tm.home?lab(tm.home):'<span class="muted">'+tm.homeSource+'</span>'}</div><input type="number" min="0" value="${r.homeGoals??''}" data-t="k" data-id="${m[0]}" data-k="homeGoals" ${dis}><span class="x">×</span><input type="number" min="0" value="${r.awayGoals??''}" data-t="k" data-id="${m[0]}" data-k="awayGoals" ${dis}><div class="rt">${tm.away?lab(tm.away):'<span class="muted">'+tm.awaySource+'</span>'}</div><button data-clear-k="${m[0]}">×</button>${tie?`<select data-win="${m[0]}"><option value="">vencedor nos pênaltis</option><option value="${tm.home}" ${r.winner===tm.home?'selected':''}>${T[tm.home][0]}</option><option value="${tm.away}" ${r.winner===tm.away?'selected':''}>${T[tm.away][0]}</option></select>`:''}</div>`}
function bindResults(){$$('input[data-t]').forEach(i=>i.onchange=e=>{const r=e.target.dataset.t==='g'?gr(e.target.dataset.id):kr(e.target.dataset.id);r[e.target.dataset.k]=num(e.target.value);(e.target.dataset.t==='g'?state.groupResults:state.knockoutResults)[e.target.dataset.id]=r;save();render()});$$('[data-win]').forEach(s=>s.onchange=e=>{const r=kr(e.target.dataset.win);r.winner=e.target.value||null;state.knockoutResults[e.target.dataset.win]=r;save();render()});$$('[data-clear-g]').forEach(b=>b.onclick=()=>{delete state.groupResults[b.dataset.clearG];save();render()});$$('[data-clear-k]').forEach(b=>b.onclick=()=>{delete state.knockoutResults[b.dataset.clearK];save();render()});$('#exp').onclick=()=>$('#json').value=JSON.stringify(exportObj(),null,2);$('#copy').onclick=async()=>{const j=JSON.stringify(exportObj(),null,2);$('#json').value=j;try{await navigator.clipboard.writeText(j);toast('JSON copiado')}catch{toast('JSON gerado')}};$('#imp').onclick=importJson;$('#clear').onclick=()=>{if(confirm('Limpar tudo?')){state={groupResults:{},knockoutResults:{},updatedAt:null};save();render()}};$('#ex').onclick=example}
function exportObj(){return{app:'copa26-tracker',version:2,groupResults:state.groupResults,knockoutResults:state.knockoutResults}}
function importJson(){try{const d=JSON.parse($('#json').value);if(d.groupResults)state.groupResults=d.groupResults;if(d.knockoutResults)state.knockoutResults=d.knockoutResults;save();render();toast('JSON importado')}catch(e){toast('JSON inválido')}}
function example(){for(const m of M)state.groupResults[m[0]]={homeGoals:Math.floor(Math.random()*4),awayGoals:Math.floor(Math.random()*4)};save();render();toast('Exemplo carregado')}
function bracket(c){const ch=champ(c);$('#app').innerHTML=`<section class="head"><div><p class="eyebrow">Mata-mata</p><h2>Chaves lado a lado</h2></div><div class="champ"><span class="muted">Campeão</span><br><b>${ch?plain(ch):'A definir'}</b></div></section><section class="wide"><b>Anexo C / terceiros:</b> <span class="muted">${c.thirdKey||'—'} · ${Object.entries(c.thirdMap).map(([s,g])=>'slot '+s+'→3'+g).join(' · ')||'aguardando'}</span></section><section class="bracket">${side([['16 avos',KO.slice(0,8).map(x=>x[0]),[1,2,3,4,5,6,7,8],1],['Oitavas',['R16-1','R16-2','R16-3','R16-4'],[1,3,5,7],2],['Quartas',['QF-1','QF-2'],[1,5],4],['Semi',['SF-1'],[1],8]],c)}<div class="center"><div class="champ"><div class="label">Final</div>${card(koBy.FINAL,c)}</div><div class="champ"><div class="label">3º lugar</div>${card(koBy['3P-1'],c)}</div></div>${side([['Semi',['SF-2'],[1],8],['Quartas',['QF-3','QF-4'],[1,5],4],['Oitavas',['R16-5','R16-6','R16-7','R16-8'],[1,3,5,7],2],['16 avos',KO.slice(8,16).map(x=>x[0]),[1,2,3,4,5,6,7,8],1]],c)}</section>`}
function side(cols,c){return`<section class="side"><div class="heads">${cols.map(x=>`<span>${x[0]}</span>`).join('')}</div><div class="tree">${cols.map((col,i)=>col[1].map((id,j)=>`<div class="slot" style="grid-column:${i+1};grid-row:${col[2][j]}/span ${col[3]}">${card(koBy[id],c)}</div>`).join('')).join('')}</div></section>`}
function card(m,c){const tm=teams(m,c),r=kr(m[0]),w=winner(m[0],c),srcs=[tm.homeSource,tm.awaySource].filter(Boolean).join(' · ');return`<article class="match"><header><span>${m[2]}</span><b>${m[3]} · ${m[4]}</b></header>${srcs?`<div class="src">${srcs}</div>`:''}<div class="bt ${w===tm.home?'win':''}"><span>${tm.home?lab(tm.home):'<span class="muted">'+tm.homeSource+'</span>'}</span><b>${done(r)?r.homeGoals:'–'}</b></div><div class="bt ${w===tm.away?'win':''}"><span>${tm.away?lab(tm.away):'<span class="muted">'+tm.awaySource+'</span>'}</span><b>${done(r)?r.awayGoals:'–'}</b></div>${done(r)&&r.homeGoals===r.awayGoals&&!w&&tm.home&&tm.away?'<span class="muted">definir pênaltis</span>':''}</article>`}
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),2200)}
$$('.tab').forEach(b=>b.onclick=()=>{screen=b.dataset.s;render()});if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));render();
</script>
</body>
</html>
